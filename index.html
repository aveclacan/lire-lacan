<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lire Lacan</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&family=IM+Fell+English+SC&family=Karla:ital,wght@0,300;0,400;0,500;1,300;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --ink: #1a1712; --ink-soft: #4a4640; --ink-faint: #8a857e;
  --paper: #f5f0e8; --paper-warm: #ede7d8; --paper-dark: #ddd5c5;
  --accent: #6b3a2a; --accent-light: #c4785a; --accent-pale: #f0e0d6;
  --gold: #9a7a3a; --gold-pale: #f4ecda; --gold-hi: rgba(196,178,80,0.32);
  --violet: #3d2d5c; --violet-pale: #e8e0f0;
  --teal: #1d4a45; --teal-pale: #d8edeb;
  --hi-yellow: rgba(255,220,60,0.38); --hi-green: rgba(80,200,120,0.38); --hi-blue: rgba(80,150,255,0.38);
  --border: rgba(26,23,18,0.12); --border-strong: rgba(26,23,18,0.25);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--paper); color: var(--ink); font-family: 'Karla', sans-serif;
  font-weight: 300; line-height: 1.7; min-height: 100vh; overflow-x: hidden; }

/* ── TOPBAR ── */
.topbar {
  position: fixed; top: 0; left: 0; right: 0; z-index: 200;
  background: var(--ink); color: var(--paper);
  display: flex; align-items: center; padding: 0 20px; height: 50px; gap: 10px;
}
.logo { font-family: 'IM Fell English SC', serif; font-size: 17px;
  letter-spacing: 0.04em; color: var(--paper); }
.logo em { color: var(--accent-light); font-style: normal; }
.topbar-sep { flex: 1; }
.topbar-sem {
  font-size: 12px; color: rgba(245,240,232,0.55); max-width: 280px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  font-family: 'IM Fell English', serif; font-style: italic;
}
.topbar-date {
  font-size: 11px; color: rgba(245,240,232,0.4);
  white-space: nowrap; padding-left: 8px; border-left: 1px solid rgba(255,255,255,0.12);
}

/* progress bar under topbar */
.topbar-progress {
  position: fixed; top: 50px; left: 0; right: 0; z-index: 199;
  height: 3px; background: rgba(26,23,18,0.15);
}
.topbar-progress-fill {
  height: 100%; background: var(--accent-light);
  transition: width 0.3s ease; width: 0%;
}

.audio-wave { display:none; align-items:center; gap:2px; height:14px; }
.audio-wave.visible { display:flex; }
.audio-wave span { display:block; width:2px; background:var(--accent-light);
  border-radius:2px; animation:wave .8s ease-in-out infinite; }
.audio-wave span:nth-child(2){animation-delay:.1s;}
.audio-wave span:nth-child(3){animation-delay:.2s;}
.audio-wave span:nth-child(4){animation-delay:.15s;}
@keyframes wave { 0%,100%{height:3px;} 50%{height:13px;} }

.pill { font-family:'Karla',sans-serif; font-size:12px; letter-spacing:.05em;
  padding:4px 11px; border-radius:20px; cursor:pointer;
  border:1px solid rgba(245,240,232,.2); color:var(--paper-warm);
  background:transparent; transition:all .2s; white-space:nowrap; }
.pill:hover { background:rgba(245,240,232,.1); color:var(--paper); }
.pill.active { background:var(--accent); border-color:var(--accent); color:var(--paper); }

/* ── TABS ── */
.main-tabs {
  position: fixed; top: 53px; left: 210px; right: 260px; z-index: 190;
  display: flex; background: var(--paper-warm);
  border-bottom: 1px solid var(--border); padding: 0 32px;
}
.main-tab {
  font-size: 12px; padding: 9px 16px; cursor: pointer;
  color: var(--ink-faint); border-bottom: 2px solid transparent;
  white-space: nowrap; transition: all .15s; user-select: none;
}
.main-tab:hover { color: var(--ink-soft); }
.main-tab.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 500; }
.tab-badge {
  display: inline-block; background: var(--accent); color: white;
  border-radius: 10px; font-size: 9px; padding: 1px 5px; margin-left: 4px;
  vertical-align: middle; line-height: 1.5;
}

/* ── LAYOUT ── */
.layout { display: grid; grid-template-columns: 210px 1fr 260px;
  min-height: 100vh; padding-top: 80px; }

/* ── SIDEBAR ── */
.sidebar {
  border-right: 1px solid var(--border); padding: 24px 0;
  position: sticky; top: 80px; height: calc(100vh - 80px);
  overflow-y: auto; background: var(--paper-warm);
}
.sidebar-head { font-family:'IM Fell English SC',serif; font-size:10px;
  letter-spacing:.15em; color:var(--ink-faint); padding:0 16px 12px;
  border-bottom:1px solid var(--border); margin-bottom:8px; text-transform:uppercase; }
.sem-item { display:block; padding:8px 16px; font-size:12.5px; color:var(--ink-soft);
  cursor:pointer; border-left:2px solid transparent; transition:all .15s; line-height:1.4; }
.sem-item:hover { background:var(--paper-dark); color:var(--ink); }
.sem-item.active { border-left-color:var(--accent); color:var(--accent);
  background:var(--accent-pale); font-weight:500; }
.sem-num { display:block; font-family:'IM Fell English',serif;
  font-size:10px; color:var(--ink-faint); margin-bottom:1px; }
.upload-btn {
  margin: 16px; display:block; text-align:center; padding:8px 12px;
  border:1.5px dashed var(--border-strong); border-radius:6px; cursor:pointer;
  font-size:12px; color:var(--ink-soft); transition:all .2s;
}
.upload-btn:hover { border-color:var(--accent-light); background:var(--accent-pale); }
.upload-btn input { display:none; }

/* ── INDEX (lições dentro do seminário) ── */
.sidebar-index { padding: 8px 0; }
.idx-item { padding: 5px 16px; font-size: 11.5px; color: var(--ink-faint);
  cursor: pointer; transition: color .15s; }
.idx-item:hover { color: var(--ink-soft); }
.idx-item.reading { color: var(--accent); font-weight: 500; }

/* ── READER ── */
.reader { padding: 0; overflow: hidden; }
.reader-inner { padding: 40px 56px; max-width: 740px; margin: 0 auto; }

/* Cabeçalho do seminário */
.sem-header { margin-bottom: 40px; padding-bottom: 28px; border-bottom: 1px solid var(--border); }
.sem-header-label { font-family:'IM Fell English SC',serif; font-size:11px;
  letter-spacing:.12em; color:var(--ink-faint); text-transform:uppercase; margin-bottom:8px; }
.sem-header-title { font-family:'IM Fell English',serif; font-size:26px;
  line-height:1.3; color:var(--ink); }

/* Cabeçalho de lição (inline no scroll) */
.lecon-header {
  margin: 44px 0 22px; padding-bottom: 14px;
  border-bottom: 1px solid var(--border);
}
.lecon-header:first-of-type { margin-top: 0; }
.lecon-num { font-family:'IM Fell English SC',serif; font-size:10px;
  letter-spacing:.12em; color:var(--ink-faint); text-transform:uppercase; margin-bottom:4px; }
.lecon-date { font-family:'IM Fell English',serif; font-style:italic;
  font-size:17px; color:var(--ink-soft); }

/* Segmento */
.segment { position:relative; padding:6px 0; cursor:text; }
.seg-body { display:flex; gap:10px; align-items:flex-start; }
.seg-num { font-family:'IM Fell English',serif; font-size:10px; color:var(--ink-faint);
  min-width:24px; text-align:right; padding-top:5px; flex-shrink:0; user-select:none; }
.seg-content { flex:1; }
.seg-fr { font-family:'IM Fell English',serif; font-size:16.5px; line-height:1.75;
  color:var(--ink); position:relative; }
.seg-marker { flex-shrink:0; width:5px; height:5px; border-radius:50%;
  margin-top:9px; background:transparent; }
.seg-marker.has-hom { background:var(--violet); }
.seg-marker.has-termo { background:var(--gold); }

/* Botão áudio (aparece no hover) */
.btn-audio {
  position:absolute; left:-34px; top:3px;
  width:22px; height:22px; border-radius:50%;
  border:1px solid var(--border-strong); background:var(--paper);
  color:var(--ink-faint); cursor:pointer; font-size:7px;
  display:flex; align-items:center; justify-content:center;
  opacity:0; transition:opacity .15s, background .15s;
}
.segment:hover .btn-audio { opacity:1; }
.btn-audio:hover, .btn-audio.playing { background:var(--accent); border-color:var(--accent); color:#fff; }

/* Tradução */
.seg-pt {
  display:none; margin-top:5px;
  padding:9px 0 4px; border-top:1px dashed var(--border);
}
.segment.open .seg-pt { display:block; }
.pt-option { display:flex; gap:8px; align-items:flex-start; margin-bottom:5px; }
.pt-tipo { font-size:9.5px; font-weight:500; letter-spacing:.06em; text-transform:uppercase;
  padding:2px 6px; border-radius:3px; flex-shrink:0; margin-top:3px; }
.pt-tipo.principal { background:var(--teal-pale); color:var(--teal); }
.pt-tipo.homofonia  { background:var(--violet-pale); color:var(--violet); }
.pt-tipo.literal    { background:var(--gold-pale);   color:var(--gold); }
.pt-text { font-size:13.5px; color:var(--ink-soft); line-height:1.6; font-style:italic; }

/* Termos marcados */
.termo-hom     { border-bottom:1.5px solid var(--violet); cursor:pointer; border-radius:1px; }
.termo-hom:hover { background:var(--violet-pale); }
.termo-conceito { border-bottom:1.5px solid var(--gold); cursor:pointer; border-radius:1px; }
.termo-conceito:hover { background:var(--gold-pale); }

/* Highlights de usuário */
.hi-yellow { background:var(--hi-yellow); border-radius:2px; }
.hi-accent  { background:var(--hi-accent); border-radius:2px; }

/* ── SELECTION MENU ── */
.sel-menu {
  position:fixed; z-index:900;
  background: #1e1c18;
  border-radius:12px; padding:10px 8px 8px;
  display:none; flex-direction:column; gap:4px;
  box-shadow:0 8px 32px rgba(0,0,0,0.5), 0 2px 8px rgba(0,0,0,0.3);
  min-width:188px;
  border: 1px solid rgba(255,255,255,0.12);
  user-select: none;
}
.sel-menu.visible { display:flex; }
.sel-section-label {
  font-size:9.5px; letter-spacing:.1em; text-transform:uppercase;
  color:rgba(245,240,232,0.35); padding:0 8px 4px; font-family:'Karla',sans-serif;
}
.sel-colors {
  display:flex; gap:6px; padding:0 8px 6px;
}
.sel-color-btn {
  width:34px; height:28px; border-radius:6px; border:none;
  background:rgba(255,255,255,0.07); cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  transition: background .12s, transform .1s;
}
.sel-color-btn:hover { background:rgba(255,255,255,0.15); transform:scale(1.1); }
.sel-divider { height:1px; background:rgba(255,255,255,0.08); margin:2px 0; }
.sel-btn {
  display:flex; align-items:center; gap:9px;
  padding:7px 10px; font-size:13px; color:rgba(245,240,232,0.85);
  cursor:pointer; border-radius:7px; transition:background .12s;
  border:none; background:transparent; width:100%; text-align:left;
  font-family:'Karla',sans-serif;
}
.sel-btn:hover { background:rgba(255,255,255,0.1); color:#fff; }
.sel-icon { width:16px; height:16px; flex-shrink:0; opacity:.8; }

/* Highlight colors */
.hi-yellow { background:rgba(255,220,60,0.35); border-radius:2px; }
.hi-green  { background:rgba(80,200,120,0.35); border-radius:2px; }
.hi-blue   { background:rgba(80,150,255,0.35); border-radius:2px; }

/* ── AUDIO CONTROLS PANEL ── */
.audio-controls {
  position:fixed; bottom:24px; right:24px; z-index:300;
  background:#1e1c18; border-radius:12px; padding:12px 14px;
  display:none; flex-direction:column; gap:10px;
  box-shadow:0 8px 24px rgba(0,0,0,0.3);
  border:1px solid rgba(255,255,255,0.08);
  min-width:220px;
}
.audio-controls.visible { display:flex; }
.audio-ctrl-row {
  display:flex; align-items:center; gap:8px;
}
.audio-ctrl-label {
  flex:1; font-size:11px; color:rgba(245,240,232,0.5);
  font-family:'IM Fell English',serif; font-style:italic;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  max-width:130px;
}
.audio-ctrl-btn {
  width:30px; height:30px; border-radius:8px; border:none;
  background:rgba(255,255,255,0.08); cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  color:rgba(245,240,232,0.8); transition:background .15s;
  flex-shrink:0;
}
.audio-ctrl-btn svg { width:14px; height:14px; }
.audio-ctrl-btn:hover { background:var(--accent); color:#fff; }
.audio-ctrl-btn.paused { background:var(--accent-light); color:#fff; }
.audio-speed-label {
  font-size:10.5px; color:rgba(245,240,232,0.4); font-family:'Karla',sans-serif;
  white-space:nowrap;
}
.audio-speed-slider {
  flex:1; height:3px; -webkit-appearance:none; appearance:none;
  background:rgba(255,255,255,0.15); border-radius:2px; outline:none; cursor:pointer;
}
.audio-speed-slider::-webkit-slider-thumb {
  -webkit-appearance:none; width:12px; height:12px;
  border-radius:50%; background:var(--accent-light); cursor:pointer;
}
.sel-btn-remove { color: rgba(255,100,80,0.9); }
.sel-btn-remove:hover { background: rgba(255,80,60,0.15); color: rgb(255,80,60); }
/* Velocidade na topbar */
.topbar-speed {
  display:flex; align-items:center; gap:6px;
  padding: 0 8px; border-left:1px solid rgba(255,255,255,0.12);
}
.topbar-speed-icon { font-size:12px; opacity:.5; }
.topbar-speed-slider {
  width:64px; height:3px; -webkit-appearance:none; appearance:none;
  background:rgba(255,255,255,0.2); border-radius:2px; outline:none; cursor:pointer;
}
.topbar-speed-slider::-webkit-slider-thumb {
  -webkit-appearance:none; width:11px; height:11px;
  border-radius:50%; background:var(--accent-light); cursor:pointer;
}
.topbar-speed-val {
  font-size:11px; color:rgba(245,240,232,0.55);
  font-family:'Karla',sans-serif; min-width:26px;
}

/* ── PANEL ── */
.panel {
  border-left:1px solid var(--border); padding:24px 18px;
  position:sticky; top:80px; height:calc(100vh - 80px);
  overflow-y:auto; background:var(--paper-warm);
  display:flex; flex-direction:column; gap:22px;
}
.panel-title { font-family:'IM Fell English SC',serif; font-size:10px;
  letter-spacing:.15em; color:var(--ink-faint); text-transform:uppercase;
  margin-bottom:10px; padding-bottom:7px; border-bottom:1px solid var(--border); }
.hom-card { background:var(--violet-pale); border:1px solid rgba(61,45,92,.15);
  border-radius:6px; padding:12px 14px; }
.hom-card-pair { font-family:'IM Fell English',serif; font-size:16px;
  color:var(--violet); margin-bottom:5px; line-height:1.3; }
.hom-card-cat { font-size:9.5px; letter-spacing:.08em; text-transform:uppercase;
  color:rgba(61,45,92,.55); margin-bottom:6px; }
.hom-card-note { font-size:12px; line-height:1.65; color:var(--violet); }
.hom-card.conceito { background:var(--gold-pale); border-color:rgba(154,122,58,.15); }
.hom-card.conceito .hom-card-pair { color:var(--gold); }
.hom-card.conceito .hom-card-cat  { color:rgba(154,122,58,.55); }
.hom-card.conceito .hom-card-note { color:#6b5020; }
.hom-card.empty { background:var(--paper-dark); border-color:var(--border); }
.hom-card.empty .hom-card-note { color:var(--ink-faint); font-style:italic; font-size:12px; }

/* Progress no painel */
.progress-ring { text-align:center; padding:4px 0 8px; }
.progress-pct { font-family:'IM Fell English',serif; font-size:32px;
  color:var(--accent); line-height:1; }
.progress-sub { font-size:11px; color:var(--ink-faint); margin-top:3px; }
.progress-bar { height:2px; background:var(--border); border-radius:2px; margin-top:8px; }
.progress-fill { height:100%; background:var(--accent); border-radius:2px; transition:width .4s; }

/* Comentário inline */
.seg-comment {
  margin:4px 0 6px 34px; padding:7px 10px;
  background:var(--gold-pale); border-left:2px solid var(--gold);
  border-radius:0 4px 4px 0; font-size:12.5px; color:#6b5020;
  line-height:1.55; position:relative;
}
.seg-comment-del {
  position:absolute; top:4px; right:6px; background:none; border:none;
  color:rgba(107,80,32,.4); cursor:pointer; font-size:13px; line-height:1;
}
.seg-comment-del:hover { color:var(--accent); }

/* ── ABA SALVOS ── */
.saved-view { display:none; padding:36px 48px; max-width:740px; margin:0 auto; }
.saved-view.visible { display:block; }
.reader-inner.hidden { display:none; }
.saved-empty { text-align:center; padding:60px 0; color:var(--ink-faint); font-style:italic; font-size:14px; }
.saved-card {
  background:white; border:1px solid var(--border); border-radius:8px;
  padding:16px 18px; margin-bottom:14px;
  box-shadow:0 1px 3px rgba(26,23,18,.06);
}
.saved-card-meta { font-size:10.5px; color:var(--ink-faint); margin-bottom:8px;
  display:flex; gap:10px; align-items:center; }
.saved-card-hi { font-family:'IM Fell English',serif; font-size:15.5px;
  line-height:1.65; margin-bottom:10px; border-left:3px solid var(--accent-light);
  padding-left:12px; color:var(--ink); }
.saved-card-comment { font-size:12.5px; color:var(--ink-soft); font-style:italic;
  background:var(--gold-pale); border-radius:4px; padding:7px 10px; margin-top:6px; }
.saved-card-del {
  float:right; background:none; border:none; color:var(--ink-faint);
  cursor:pointer; font-size:12px; transition:color .15s;
}
.saved-card-del:hover { color:var(--accent); }
.hi-dot { width:8px; height:8px; border-radius:50%; display:inline-block; }

/* ── MODAL COMENTÁRIO ── */
.modal-overlay {
  position:fixed; inset:0; z-index:600; background:rgba(26,23,18,.35);
  display:none; align-items:center; justify-content:center;
}
.modal-overlay.visible { display:flex; }
.modal {
  background:var(--paper); border-radius:10px; padding:24px;
  width:440px; max-width:90vw; box-shadow:0 8px 32px rgba(0,0,0,.2);
}
.modal-title { font-family:'IM Fell English',serif; font-size:16px;
  color:var(--ink); margin-bottom:4px; }
.modal-excerpt { font-size:12px; color:var(--ink-faint); font-style:italic;
  margin-bottom:14px; line-height:1.5; border-left:2px solid var(--border-strong);
  padding-left:8px; }
.modal textarea {
  width:100%; border:1px solid var(--border-strong); border-radius:6px;
  background:white; color:var(--ink); font-family:'Karla',sans-serif;
  font-size:13.5px; padding:10px 12px; resize:vertical; min-height:90px;
  line-height:1.6; outline:none;
}
.modal textarea:focus { border-color:var(--accent-light); }
.modal-btns { display:flex; gap:8px; justify-content:flex-end; margin-top:12px; }
.modal-btn {
  padding:7px 16px; border-radius:6px; font-size:13px; cursor:pointer;
  border:1px solid var(--border-strong); background:transparent;
  color:var(--ink-soft); transition:all .15s; font-family:'Karla',sans-serif;
}
.modal-btn.primary { background:var(--accent); border-color:var(--accent);
  color:white; font-weight:500; }
.modal-btn:hover:not(.primary) { background:var(--paper-dark); }

/* Barra de progresso do áudio */
.audio-progress-track {
  height:4px; background:rgba(255,255,255,0.12); border-radius:2px;
  margin:4px 0; cursor:pointer; position:relative;
}
.audio-progress-fill {
  height:100%; background:var(--accent-light); border-radius:2px;
  transition:width .2s linear; width:0%;
  pointer-events:none;
}
.audio-time-left {
  font-size:10px; color:rgba(245,240,232,0.4);
  font-family:'Karla',sans-serif; min-width:24px; text-align:right;
}

/* ── TEMA / PERSONALIZAÇÃO ── */
.main-tab-spacer { flex:1; }
.theme-btn {
  font-size:11.5px; padding:0 12px; border:none;
  background:transparent; color:var(--ink-faint); cursor:pointer;
  border-bottom:2px solid transparent; transition:color .15s;
}
.theme-btn:hover { color:var(--ink-soft); }

.theme-panel {
  position:fixed; top:80px; right:0; z-index:300;
  background:var(--paper-warm); border-left:1px solid var(--border);
  border-bottom:1px solid var(--border);
  padding:16px 18px; display:none; flex-direction:column; gap:10px;
  min-width:220px; border-radius:0 0 0 10px;
  box-shadow:-4px 4px 16px rgba(26,23,18,0.1);
}
.theme-panel.visible { display:flex; }
.theme-section { font-family:'IM Fell English SC',serif; font-size:10px;
  letter-spacing:.12em; color:var(--ink-faint); text-transform:uppercase; }
.theme-palettes { display:flex; gap:8px; }
.palette-btn {
  width:36px; height:24px; border-radius:6px; border:2px solid transparent;
  cursor:pointer; display:flex; overflow:hidden; padding:0;
  transition:border-color .15s;
}
.palette-btn span { flex:1; display:block; }
.palette-btn.active { border-color:var(--accent); }
.palette-btn:hover { border-color:var(--accent-light); }
.theme-fonts { display:flex; gap:6px; flex-wrap:wrap; }
.font-btn {
  padding:4px 10px; font-size:12.5px; border-radius:5px;
  border:1px solid var(--border-strong); background:transparent;
  color:var(--ink-soft); cursor:pointer; transition:all .15s;
}
.font-btn:hover { background:var(--paper-dark); }
.font-btn.active { background:var(--accent-pale); border-color:var(--accent-light);
  color:var(--accent); }

/* ── TEMA NOTURNO ── */
body.theme-night {
  --ink:#e8e4dc; --ink-soft:#b0a898; --ink-faint:#706860;
  --paper:#1a1a2e; --paper-warm:#16213e; --paper-dark:#0f3460;
  --accent:#7b8cde; --accent-light:#a0aff0; --accent-pale:#1e2a5e;
  --border:rgba(232,228,220,0.1); --border-strong:rgba(232,228,220,0.2);
}
body.theme-sage {
  --ink:#1a2a20; --ink-soft:#3d5a45; --ink-faint:#7a9a82;
  --paper:#f0f4f0; --paper-warm:#e4ece5; --paper-dark:#ccddd0;
  --accent:#3d6b5a; --accent-light:#5a9e80; --accent-pale:#d4ebe0;
}
body.theme-paper {
  --ink:#2d2d2d; --ink-soft:#555; --ink-faint:#999;
  --paper:#ffffff; --paper-warm:#f8f8f8; --paper-dark:#eee;
  --accent:#2d2d2d; --accent-light:#555; --accent-pale:#f0f0f0;
}

/* ── ABA TRADUÇÃO ── */
.trad-view {
  display:none; padding:36px 48px; max-width:740px; margin:0 auto;
}
.trad-view.visible { display:block; }
.trad-search-box {
  display:flex; gap:10px; margin-bottom:24px; align-items:center;
}
.trad-input {
  flex:1; font-family:'IM Fell English',serif; font-size:17px;
  padding:10px 14px; border:1.5px solid var(--border-strong);
  border-radius:8px; background:var(--paper); color:var(--ink); outline:none;
}
.trad-input:focus { border-color:var(--accent-light); }
.trad-dir-btn {
  padding:8px 14px; border-radius:8px; border:1px solid var(--border-strong);
  background:var(--paper-warm); color:var(--ink-soft); cursor:pointer;
  font-size:13px; font-family:'Karla',sans-serif; transition:all .15s;
  white-space:nowrap;
}
.trad-dir-btn:hover { background:var(--paper-dark); }
.trad-search-btn {
  padding:9px 18px; border-radius:8px; border:none;
  background:var(--accent); color:white; cursor:pointer;
  font-size:13px; font-family:'Karla',sans-serif; font-weight:500;
  transition:background .15s;
}
.trad-search-btn:hover { background:var(--accent-light); }

.trad-results { display:flex; flex-direction:column; gap:16px; }
.trad-result-card {
  background:var(--paper-warm); border:1px solid var(--border);
  border-radius:8px; padding:14px 16px;
}
.trad-term {
  font-family:'IM Fell English',serif; font-size:18px;
  color:var(--ink); margin-bottom:8px;
}
.trad-translations { display:flex; flex-wrap:wrap; gap:8px; margin-bottom:10px; }
.trad-tag {
  display:inline-flex; align-items:center; gap:5px;
  padding:4px 10px; border-radius:20px; font-size:12.5px;
  cursor:default; border:1px solid transparent;
}
.trad-tag-label {
  font-size:9.5px; font-weight:600; letter-spacing:.06em;
  text-transform:uppercase; padding:1px 5px; border-radius:3px;
}
/* Cores por classe gramatical */
.trad-tag.subst { background:rgba(70,130,255,0.12); border-color:rgba(70,130,255,0.3); color:#2a5ab0; }
.trad-tag.subst .trad-tag-label { background:rgba(70,130,255,0.2); color:#1a4a9a; }
.trad-tag.adj   { background:rgba(220,80,150,0.1); border-color:rgba(220,80,150,0.3); color:#9a2060; }
.trad-tag.adj .trad-tag-label   { background:rgba(220,80,150,0.2); color:#7a1050; }
.trad-tag.verb  { background:rgba(255,180,50,0.15); border-color:rgba(255,180,50,0.4); color:#8a5500; }
.trad-tag.verb .trad-tag-label  { background:rgba(255,180,50,0.25); color:#6a4000; }
.trad-tag.adv   { background:rgba(60,180,100,0.12); border-color:rgba(60,180,100,0.3); color:#1a6a40; }
.trad-tag.adv .trad-tag-label   { background:rgba(60,180,100,0.2); color:#0a5030; }

.trad-example {
  font-size:12.5px; color:var(--ink-faint); font-style:italic;
  border-left:2px solid var(--border-strong); padding-left:10px;
  margin-top:8px; line-height:1.6;
}
.trad-example-pair {
  margin-top:10px; padding:10px 12px;
  background:var(--paper); border-radius:6px;
  border-left:3px solid var(--accent-light);
}
.trad-ex-fr {
  font-size:13px; color:var(--ink-soft); font-style:italic;
  line-height:1.5; margin-bottom:4px;
}
.trad-ex-pt {
  font-size:13px; color:var(--ink-faint); line-height:1.5;
}

::-webkit-scrollbar { width:4px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:var(--border-strong); border-radius:3px; }
</style>
</head>
<body>

<!-- TOPBAR -->
<header class="topbar">
  <div class="logo">lire <em>lacan</em></div>
  <div class="topbar-sep"></div>
  <div class="topbar-sem" id="topSem">—</div>
  <div class="topbar-date" id="topDate">—</div>
  <div class="audio-wave" id="globalWave">
    <span></span><span></span><span></span><span></span>
  </div>
  <div class="topbar-speed" title="Velocidade do áudio">
    <span class="topbar-speed-icon">🔊</span>
    <input type="range" class="topbar-speed-slider" id="topbarSpeed"
      min="0.5" max="1.5" step="0.1" value="0.9"

    <span class="topbar-speed-val" id="topbarSpeedVal">0.9×</span>

<div class="topbar-progress"><div class="topbar-progress-fill" id="topProgress"></div></div>

<!-- TABS -->
<div class="main-tabs" id="mainTabs" style="display:none">

  <div class="main-tab" id="tabTrad" onclick="switchTab('trad')">Tradução</div>
  <div class="main-tab" id="tabSaved" onclick="switchTab('saved')">

  </div>
  <div class="main-tab-spacer"></div>
  <button class="main-tab theme-btn" onclick="toggleThemePanel()" title="Personalizar">⚙ Tema</button>
</div>

<!-- PAINEL DE TEMA -->
<div class="theme-panel" id="themePanel">
  <div class="theme-section">Paleta</div>
  <div class="theme-palettes">
    <button class="palette-btn active" data-theme="sepia" onclick="setTheme('sepia')" title="Sépia (padrão)">
      <span style="background:#f5f0e8"></span><span style="background:#6b3a2a"></span>
    </button>
    <button class="palette-btn" data-theme="night" onclick="setTheme('night')" title="Noturno">
      <span style="background:#1a1a2e"></span><span style="background:#7b8cde"></span>
    </button>
    <button class="palette-btn" data-theme="sage" onclick="setTheme('sage')" title="Sálvia">
      <span style="background:#f0f4f0"></span><span style="background:#3d6b5a"></span>
    </button>
    <button class="palette-btn" data-theme="paper" onclick="setTheme('paper')" title="Branco">
      <span style="background:#ffffff"></span><span style="background:#2d2d2d"></span>
    </button>
  </div>
  <div class="theme-section">Fonte do texto</div>
  <div class="theme-fonts">
    <button class="font-btn active" onclick="setFont('fell')" data-font="fell">IM Fell</button>
    <button class="font-btn" onclick="setFont('serif')" data-font="serif">Georgia</button>
    <button class="font-btn" onclick="setFont('sans')" data-font="sans">Sans-serif</button>
    <button class="font-btn" onclick="setFont('mono')" data-font="mono">Monospace</button>
  </div>
  <div class="theme-section">Tamanho</div>
  <div class="theme-fonts">
    <button class="font-btn" onclick="setFontSize(14)">P</button>
    <button class="font-btn active" onclick="setFontSize(16.5)">M</button>
    <button class="font-btn" onclick="setFontSize(19)">G</button>
  </div>
</div>

<!-- LAYOUT -->
<div class="layout">
  <nav class="sidebar">
    <div class="sidebar-head">Seminários</div>
    <div id="semList"></div>
    <label class="upload-btn">
      <input type="file" accept=".json" onchange="loadJSON(event)">
      + carregar JSON
    </label>
    <div class="sidebar-index" id="sideIndex"></div>
  </nav>

  <main class="reader" id="readerCol">
    <div class="reader-inner" id="readerInner">
      <div style="text-align:center;padding:80px 0;color:var(--ink-faint)">
        <div style="font-size:32px;margin-bottom:16px">⌖</div>
        <div style="font-family:'IM Fell English',serif;font-size:20px;margin-bottom:8px">Lire Lacan</div>
        <div style="font-size:13px;max-width:280px;margin:0 auto;line-height:1.7">
          Selecione um seminário ao lado para iniciar a leitura.
        </div>
      </div>

    <div class="saved-view" id="savedView"></div>
    <div class="trad-view" id="tradView"></div>

  <aside class="panel">
    <div>
      <div class="panel-title">Termo selecionado</div>
      <div id="homCard">
        <div class="hom-card empty">
          <div class="hom-card-note">Clique em um termo sublinhado para ver a nota de leitura.</div>
        </div>
      </div>

    <div>
      <div class="panel-title">Progresso</div>
      <div class="progress-ring">
        <div class="progress-pct" id="pctNum">0%</div>

    </div>

</div>

<!-- MENU DE SELEÇÃO — conteúdo gerado dinamicamente via JS -->

<!-- MODAL COMENTÁRIO -->
<div class="modal-overlay" id="modalOverlay">

    <div class="modal-title">Comentário</div>
    <div class="modal-excerpt" id="modalExcerpt"></div>
    <textarea id="modalText" placeholder="Escreva sua nota…"></textarea>
    <div class="modal-btns">
      <button class="modal-btn" onclick="closeModal()">Cancelar</button>
      <button class="modal-btn primary" onclick="confirmComment()">Salvar</button>
    </div>
  </div>
</div>

<!-- CONTROLES DE ÁUDIO -->
<div class="audio-controls" id="audioControls">
  <div class="audio-ctrl-row">
    <span class="audio-ctrl-label" id="audioSegLabel" data-seg-id="">—</span>
    <button class="audio-ctrl-btn" onclick="restartAudio()" title="Recomeçar">
      <svg viewBox="0 0 20 20" fill="currentColor">
        <path d="M10 4V1L6 5l4 4V6a5 5 0 015 5 5 5 0 01-5 5 5 5 0 01-5-5H3a7 7 0 007 7 7 7 0 007-7 7 7 0 00-7-7z"/>
      </svg>
    </button>
    <button class="audio-ctrl-btn" id="audioPauseBtn" onclick="togglePauseAudio()" title="Pausar">
      <svg viewBox="0 0 20 20" fill="currentColor">
        <rect x="4" y="3" width="4" height="14" rx="1"/>
        <rect x="12" y="3" width="4" height="14" rx="1"/>
      </svg>
    </button>
    <button class="audio-ctrl-btn" onclick="stopAudio()" title="Parar">
      <svg viewBox="0 0 20 20" fill="currentColor">
        <rect x="3" y="3" width="14" height="14" rx="2"/>
      </svg>
    </button>
    <span class="audio-time-left" id="audioTimeLeft"></span>
  </div>
  <!-- Barra de progresso do áudio -->
  <div class="audio-progress-track" onclick="audioSeekClick(event)" title="Posição no áudio">
    <div class="audio-progress-fill" id="audioProgressFill"></div>
  </div>
  <div class="audio-ctrl-row">
    <span class="audio-speed-label">Velocidade</span>

      oninput="changeSpeed(this.value)">
    <span class="audio-speed-val" id="audioSpeedVal">0.85×</span>
  </div>
</div>

<script>
// ══════════════════════════════════════════════════════
//  DADOS DE DEMONSTRAÇÃO
// ══════════════════════════════════════════════════════
const DEMO = {
  numero: 11,
  titulo_fr: "Les quatre concepts fondamentaux de la psychanalyse",
  ano: "1964",
  licoes: [
    {
      numero: 1, titulo_detectado: "8 janvier 1964", data_detectada: "1964-01-08",
      segmentos: [
        { id:"s01", texto_fr:"Ce qui m'importe, c'est ce que la psychanalyse m'a appris — à savoir, que le désir de l'homme, c'est le désir de l'Autre.", tem_homofonia:true,
          termos:[
            {entrada:"désir",inicio:73,fim:78,categoria:"conceito_central",homofonia:["de-sir","de sire"],nota_pt:"Raiz latina desiderare — ausência da estrela. O genitivo «désir de l'Autre» é ambíguo de forma constitutiva: desejo pelo Outro e desejo que vem do Outro. Essa ambiguidade não deve ser resolvida."},
            {entrada:"désir",inicio:94,fim:99,categoria:"conceito_central",homofonia:[],nota_pt:""},
            {entrada:"Autre",inicio:107,fim:112,categoria:"homofonia_pura",homofonia:["autre (minúscula) — idênticos na fala"],nota_pt:"A maiúscula é decisiva e INAUDÍVEL. Autre = lugar do código, da lei, da linguagem. autre = semelhante, imagem especular. Na fala de Lacan, apenas o contexto os distingue."}
          ],
          traducoes:[{texto:"O que me importa é o que a psicanálise me ensinou — que o desejo do homem é o desejo do Outro.",tipo:"principal"},{texto:"…que o desejo do homem é desejo-do-Outro [genitivo duplo: pelo Outro / que vem do Outro]",tipo:"homofonia"}]
        },
        { id:"s02", texto_fr:"L'inconscient est structuré comme un langage.", tem_homofonia:false,
          termos:[{entrada:"langage",inicio:33,fim:40,categoria:"distincao_lexical",homofonia:["langue","lalangue"],nota_pt:"Langage ≠ langue ≠ lalangue. Langage = a função ou faculdade da linguagem em geral. Traduzir: «linguagem». Distinto de langue (língua como sistema) e lalangue (material sonoro pré-simbólico)."}],
          traducoes:[{texto:"O inconsciente é estruturado como uma linguagem.",tipo:"principal"},{texto:"…como linguagem [langage ≠ langue: não «a língua» como sistema]",tipo:"literal"}]
        },
        { id:"s03", texto_fr:"Le sujet n'est pas le moi.", tem_homofonia:false,
          termos:[{entrada:"sujet",inicio:3,fim:8,categoria:"ambiguidade_lexical",homofonia:["sujet (tema / assunto)","je suis jet"],nota_pt:"Sujet em francês significa também «assunto», «tema», «súdito». O sujeito lacaniano nunca é substância — é efeito do significante, marcado pela falta."}],
          traducoes:[{texto:"O sujeito não é o eu.",tipo:"principal"}]
        },
        { id:"s04", texto_fr:"Il n'y a pas de rapport sexuel.", tem_homofonia:false,
          termos:[{entrada:"rapport",inicio:16,fim:23,categoria:"ambiguidade_lexical",homofonia:["rapport (relatório)","rapport (proporção matemática)"],nota_pt:"Rapport = relação, mas também proporção matemática e rendimento. Lacan joga com a impossibilidade de escrever uma proporção entre os sexos. Traduzir só como «relação» apaga a ressonância matemática."}],
          traducoes:[{texto:"Não há relação sexual.",tipo:"principal"},{texto:"Não há rapport sexual [proporção / relação — inescrevível]",tipo:"homofonia"}]
        },
        { id:"s05", texto_fr:"Ce que je cherche dans la parole, c'est la réponse de l'autre.", tem_homofonia:true,
          termos:[{entrada:"autre",inicio:56,fim:61,categoria:"homofonia_pura",homofonia:["Autre (grande Outro)"],nota_pt:"Pequeno outro — o semelhante. Na fala, indistinguível do grande Outro. A ambiguidade é constitutiva: busco o outro semelhante, mas é o Outro (lugar do código) que responde."}],
          traducoes:[{texto:"O que busco na palavra é a resposta do outro [semelhante].",tipo:"principal"},{texto:"…a resposta do outro/Outro [ambiguidade audível na fala]",tipo:"homofonia"}]
        },
        { id:"s06", texto_fr:"Ce qui me constitue comme sujet, c'est ma question.", tem_homofonia:false,
          termos:[{entrada:"sujet",inicio:26,fim:31,categoria:"ambiguidade_lexical",homofonia:[],nota_pt:""}],
          traducoes:[{texto:"O que me constitui como sujeito é minha questão.",tipo:"principal"}]
        }
      ]
    },
    {
      numero: 2, titulo_detectado: "20 février 1973", data_detectada: "1973-02-20",
      segmentos: [
        { id:"s07", texto_fr:"La jouissance de l'Autre, du corps de l'Autre qui le symbolise, n'est pas le signe de l'amour.", tem_homofonia:true,
          termos:[
            {entrada:"jouissance",inicio:3,fim:13,categoria:"homofonia_semantica",homofonia:["j'ouïssance (eu ouço)","jouis-sens (gozo-sentido)"],nota_pt:"Jouissance contém jouir e ressoa com j'ouïs (eu ouço). Lacan explora jouis-sens = gozar de sentido. Traduzir como «gozo» perde a dimensão erótico-jurídica. Algumas edições mantêm jouissance sem tradução."},
            {entrada:"Autre",inicio:18,fim:23,categoria:"homofonia_pura",homofonia:["autre (minúscula)"],nota_pt:""},
            {entrada:"Autre",inicio:36,fim:41,categoria:"homofonia_pura",homofonia:[],nota_pt:""}
          ],
          traducoes:[{texto:"O gozo do Outro, do corpo do Outro que o simboliza, não é o signo do amor.",tipo:"principal"},{texto:"A jouissance do Outro… [intraduzível — manter em francês]",tipo:"literal"}]
        },
        { id:"s08", texto_fr:"L'amour, c'est donner ce qu'on n'a pas à quelqu'un qui n'en veut pas.", tem_homofonia:false, termos:[],
          traducoes:[{texto:"O amor é dar o que não se tem a alguém que não o quer.",tipo:"principal"}]
        },
        { id:"s09", texto_fr:"Le signifiant représente le sujet pour un autre signifiant.", tem_homofonia:true,
          termos:[
            {entrada:"signifiant",inicio:3,fim:13,categoria:"conceito_central",homofonia:[],nota_pt:"O significante lacaniano representa o sujeito para outro significante — não para um significado. A cadeia significante é o que determina o sujeito."},
            {entrada:"autre",inicio:40,fim:45,categoria:"homofonia_pura",homofonia:["Autre (grande Outro)"],nota_pt:"Aqui: outro significante (minúsculo). Mas na fala ressoa com o grande Outro — o lugar onde os significantes se inscrevem."},
            {entrada:"signifiant",inicio:46,fim:56,categoria:"conceito_central",homofonia:[],nota_pt:""}
          ],
          traducoes:[{texto:"O significante representa o sujeito para um outro significante.",tipo:"principal"}]
        },
        { id:"s10", texto_fr:"Lalangue n'est pas la langue.", tem_homofonia:false,
          termos:[
            {entrada:"Lalangue",inicio:0,fim:8,categoria:"neologismo",homofonia:["la langue / lalangue — uma palavra vs. duas"],nota_pt:"Lalangue (uma só palavra, invenção lacaniana) = material sonoro pré-simbólico anterior à língua como sistema. É onde homofonia e equívoco operam. Tradução de J.-A. Miller: «alíngua»."},
            {entrada:"langue",inicio:22,fim:28,categoria:"distincao_lexical",homofonia:["langage","lalangue"],nota_pt:"Langue = a língua como sistema. Distinta de lalangue."}
          ],
          traducoes:[{texto:"Alíngua não é a língua.",tipo:"principal"},{texto:"Lalangue [neologismo — manter] não é la langue [a língua como sistema]",tipo:"literal"}]
        },
        { id:"s11", texto_fr:"Il y a du réel, et ce réel est l'impossible.", tem_homofonia:false,
          termos:[
            {entrada:"réel",inicio:10,fim:14,categoria:"conceito_central",homofonia:[],nota_pt:"O Real lacaniano ≠ a realidade (réalité). Real = o que resiste à simbolização, o impossível. Traduzir sempre com maiúscula: «o Real»."},
            {entrada:"réel",inicio:22,fim:26,categoria:"conceito_central",homofonia:[],nota_pt:""}
          ],
          traducoes:[{texto:"Há o Real, e esse Real é o impossível.",tipo:"principal"}]
        }
      ]
    },
    {
      numero: 3, titulo_detectado: "18 novembre 1975", data_detectada: "1975-11-18",
      segmentos: [
        { id:"s12", texto_fr:"Joyce est un sinthome.", tem_homofonia:false,
          termos:[{entrada:"sinthome",inicio:13,fim:21,categoria:"neologismo",homofonia:["symptôme (sintoma)","saint homme (homem santo)","sin Thomas"],nota_pt:"Grafia arcaica de symptôme, introduzida no Seminário XXIII. Ressoa com saint homme (homem santo) e sin Thomas (sem Tomás). O sinthome é o que resta quando a análise não dissolve — modo singular de gozo."}],
          traducoes:[{texto:"Joyce é um sinthoma.",tipo:"principal"}]
        },
        { id:"s13", texto_fr:"Le sinthome n'est pas le symptôme — il est le mode singulier de jouir.", tem_homofonia:true,
          termos:[
            {entrada:"sinthome",inicio:3,fim:11,categoria:"neologismo",homofonia:["saint homme","sin Thomas"],nota_pt:""},
            {entrada:"symptôme",inicio:24,fim:32,categoria:"neologismo",homofonia:["sinthome"],nota_pt:"Symptôme = sintoma no sentido clássico. Sinthome = aquilo que permanece após a travessia do fantasma."},
            {entrada:"jouir",inicio:64,fim:69,categoria:"homofonia_semantica",homofonia:["jouis-sens","j'ouïs"],nota_pt:"Jouir = gozar. Ressoa com jouis-sens (gozar de sentido) e j'ouïs (eu ouço). O modo de jouir é o que singulariza cada sujeito."}
          ],

// Lista de seminários disponíveis na pasta seminarios/
const SEMINARIOS_DISPONIVEIS = [11, 23];

async function carregarSeminariosDaPasta() {
  const carregados = [];
  const erros = [];
  for (const num of SEMINARIOS_DISPONIVEIS) {
    const nome = 'seminarios/seminario_' + String(num).padStart(2, '0') + '.json';
    try {
      const resp = await fetch(nome);
      if (resp.ok) {
        const data = await resp.json();
        if (data.licoes) {
          carregados.push(data);
        } else {
          erros.push('Sem. ' + num + ': JSON sem campo licoes');
        }
      } else {
        erros.push('Sem. ' + num + ': HTTP ' + resp.status);
      }
    } catch (e) {
      erros.push('Sem. ' + num + ': ' + e.message);
    }
  }
  if (erros.length) {
    console.warn('Seminários não carregados:', erros);
  }
  return carregados;
}

window.addEventListener('DOMContentLoaded', async () => {
  if ('speechSynthesis' in window) speechSynthesis.getVoices();
  setupScrollObserver();
  setupSelectionMenu();

  // Carregar JSONs da pasta seminarios/
  const seminariosDaPasta = await carregarSeminariosDaPasta();
  if (seminariosDaPasta.length > 0) {
    // Usar apenas os seminários reais, sem o demo embutido
    S.seminarios = seminariosDaPasta;
  }
  // Se não carregou nenhum, manter o demo do Seminário 11

  renderSidebar();
  // Abrir o primeiro seminário automaticamente
  loadSeminario(0);
});

function loadSeminario(idx) {
  S.semAtual = idx;
  S.readSegs.clear();
  renderSidebar();
  const sem = S.seminarios[idx];
  document.getElementById('topSem').textContent = `Séminaire ${sem.numero} — ${sem.titulo_fr}`;
  document.getElementById('mainTabs').style.display = 'flex';
  S.activeTab = 'read';
  document.getElementById('tabRead').classList.add('active');
  document.getElementById('tabSaved').classList.remove('active');
  renderSideIndex(sem);
  renderFullReader(sem);
}

function renderFullReader(sem) {
  const inner = document.getElementById('readerInner');
  document.getElementById('savedView').classList.remove('visible');
  inner.classList.remove('hidden');
  inner.innerHTML = ''; // Limpar conteúdo anterior

  // Contar total de segmentos
  S.totalSegs = sem.licoes.reduce((n, l) => n + l.segmentos.length, 0);

  // Cabeçalho do seminário (título e ano — sem texto lacaniano)
  const header = document.createElement('div');
  header.className = 'sem-header';
  header.innerHTML = `<div class="sem-header-label">Séminaire ${sem.numero} · ${escH(sem.ano)}</div>
    <div class="sem-header-title">${escH(sem.titulo_fr)}</div>`;
  inner.appendChild(header);

  // Lições em sequência contínua — segmentos via DOM API
  // para evitar repetição de caracteres especiais franceses
  let globalIdx = 0;
  sem.licoes.forEach(licao => {
    // Cabeçalho da lição
    const leconDiv = document.createElement('div');
    leconDiv.className = 'lecon-header';
    leconDiv.id = 'lecon_' + licao.numero;
    leconDiv.dataset.licao = licao.numero;
    leconDiv.dataset.date = licao.titulo_detectado;
    leconDiv.innerHTML = `<div class="lecon-num">Lição ${licao.numero}</div>
      <div class="lecon-date">${escH(licao.titulo_detectado)}</div>`;
    inner.appendChild(leconDiv);

    licao.segmentos.forEach(seg => {
      globalIdx++;
      inner.appendChild(buildSegEl(seg, globalIdx, licao.numero));
    });
  });

  updateProgress();
  requestAnimationFrame(() => window._reobserve && window._reobserve());
}

// ══════════════════════════════════════════════════════

// Cria um elemento e define seus atributos
function el(tag, attrs, ...children) {
  const e = document.createElement(tag);
  if (attrs) Object.entries(attrs).forEach(([k, v]) => {
    if (k === 'cls') e.className = v;
    else if (k === 'id') e.id = v;
    else e.setAttribute(k, v);
  });
  children.forEach(c => {
    if (typeof c === 'string') e.appendChild(document.createTextNode(c));
    else if (c) e.appendChild(c);
  });
  return e;
}

function buildSegEl(seg, idx, licaoNum) {
  textosPuros[seg.id] = seg.texto_fr;
  const marker = seg.tem_homofonia ? 'has-hom' : (seg.termos?.length ? 'has-termo' : '');

  // Div raiz
  const div = el('div', { cls: 'segment', id: 'seg_' + seg.id, 'data-seg': seg.id, 'data-licao': licaoNum });

  // seg-body
  const body = el('div', { cls: 'seg-body' });
  body.appendChild(el('span', { cls: 'seg-num' }, String(idx)));

  // seg-content
  const content = el('div', { cls: 'seg-content' });

  // seg-fr — construído por nós de texto + spans, nunca innerHTML
  const frDiv = el('div', { cls: 'seg-fr', id: 'fr_' + seg.id });
  buildFRNodes(seg.texto_fr, seg.termos || [], seg.id).forEach(n => frDiv.appendChild(n));
  content.appendChild(frDiv);

  // seg-pt
  const ptDiv = el('div', { cls: 'seg-pt', id: 'pt_' + seg.id });
  buildPTNodes(seg.traducoes || []).forEach(n => ptDiv.appendChild(n));
  content.appendChild(ptDiv);

  body.appendChild(content);
  body.appendChild(el('div', { cls: 'seg-marker ' + marker }));
  div.appendChild(body);

  // Botão de áudio
  const btn = el('button', { cls: 'btn-audio', id: 'btn_' + seg.id, title: 'Ouvir em francês' }, '▶');
  btn.addEventListener('click', e => { e.stopPropagation(); playAudio(seg.id); });
  div.appendChild(btn);

  // Comentários
  div.appendChild(el('div', { id: 'cmts_' + seg.id }));

  return div;
}

// Constrói nós de texto para o FR com spans de termos por posição
function buildFRNodes(texto, termos, segId) {
  const nodes = [];
  if (!termos.length) {
    nodes.push(document.createTextNode(texto));
    return nodes;
  }
  // Normalizar campos — suporta tanto inicio/fim quanto posicao_inicio/posicao_fim
  const normalizados = termos.map(t => ({
    ...t,
    inicio: t.inicio ?? t.posicao_inicio,
    fim: t.fim ?? t.posicao_fim,
    entrada: t.entrada ?? t.entrada_catalogo,
  }));

  // Filtrar e ordenar marcas válidas
  const sorted = [...normalizados].sort((a, b) => a.inicio - b.inicio);
  const marks = [];
  let cur = 0;
  for (const t of sorted) {
    if (typeof t.inicio !== 'number' || typeof t.fim !== 'number') continue;
    if (t.inicio < 0 || t.fim <= t.inicio || t.inicio < cur) continue;
    if (t.fim > texto.length) continue;
    marks.push(t);
    cur = t.fim;
  }
  if (!marks.length) {
    nodes.push(document.createTextNode(texto));
    return nodes;
  }
  let pos = 0;
  marks.forEach((t, mi) => {
    if (t.inicio > pos) nodes.push(document.createTextNode(texto.slice(pos, t.inicio)));
    const isHom = t.categoria?.includes('homofonia');
    const span = el('span', {
      cls: isHom ? 'termo-hom' : 'termo-conceito',
      'data-seg': segId,
      'data-mi': String(mi)
    }, texto.slice(t.inicio, t.fim));
    nodes.push(span);
    pos = t.fim;
  });
  if (pos < texto.length) nodes.push(document.createTextNode(texto.slice(pos)));
  return nodes;
}

// Constrói nós de tradução
function buildPTNodes(traducoes) {
  if (!traducoes.length) {
    const d = el('div', { cls: 'pt-option' });
    d.appendChild(el('span', { cls: 'pt-tipo literal' }, 'nota'));
    d.appendChild(el('span', { cls: 'pt-text' }, '[tradução pendente]'));
    return [d];
  }
  return traducoes.map(tr => {
    const d = el('div', { cls: 'pt-option' });
    d.appendChild(el('span', { cls: 'pt-tipo ' + (tr.tipo || 'principal') }, tr.tipo || 'principal'));
    d.appendChild(el('span', { cls: 'pt-text' }, tr.texto || ''));
    return d;
  });
}

//  CLIQUE EM TERMOS (delegação via data-mi)
// ══════════════════════════════════════════════════════
document.addEventListener('click', e => {
  const span = e.target.closest('[data-mi]');
  if (!span) return;
  e.stopPropagation();
  const segEl = span.closest('[data-seg]');
  if (!segEl) return;
  const segId = segEl.dataset.seg;
  const mi = parseInt(span.dataset.mi);
  const sem = S.seminarios[S.semAtual];
  if (!sem) return;
  for (const licao of sem.licoes) {
    const seg = licao.segmentos.find(s => s.id === segId);
    if (!seg) continue;
    // Normalizar campos — suporta ambos os formatos
    const termos = (seg.termos || []).map(t => ({
      ...t,
      inicio: t.inicio ?? t.posicao_inicio ?? 0,
      fim: t.fim ?? t.posicao_fim ?? 0,
      entrada: t.entrada ?? t.entrada_catalogo ?? t.termo ?? '',
    }));
    const sorted = [...termos].sort((a, b) => a.inicio - b.inicio);
    const marks = [];
    let cur = 0;
    for (const t of sorted) {
      if (t.inicio < cur || t.fim > seg.texto_fr.length) continue;
      marks.push(t); cur = t.fim;
    }
    const termo = marks[mi];
    if (termo && (termo.nota_pt || termo.homofonia?.length)) showTermoPanel(termo);
    break;
  }
});

// ══════════════════════════════════════════════════════
//  SCROLL OBSERVER → data no topbar + índice lateral + progresso
// ══════════════════════════════════════════════════════
function setupScrollObserver() {
  const observer = new IntersectionObserver(entries => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        const el = entry.target;
        // Atualizar data no topbar
        if (el.classList.contains('lecon-header')) {
          document.getElementById('topDate').textContent = el.dataset.date || '';
          // Atualizar índice lateral
          const num = parseInt(el.dataset.licao);
          document.querySelectorAll('.idx-item').forEach(i => i.classList.remove('reading'));
          const idx = document.getElementById('idx_' + num);
          if (idx) idx.classList.add('reading');
        }
        // Marcar segmento como lido quando entra na view
        if (el.classList.contains('segment')) {
          const id = el.dataset.seg;
          S.readSegs.add(id);
          updateProgress();
        }
      }
    });
  }, { threshold: 0.2 });

  // Re-observar ao carregar o reader
  window._reobserve = () => {
    document.querySelectorAll('.lecon-header, .segment').forEach(el => observer.observe(el));
  };
}

function updateProgress() {

  const pct = Math.round(100 * S.readSegs.size / S.totalSegs);
  document.getElementById('pctNum').textContent = pct + '%';
  document.getElementById('pctSub').textContent = `${S.readSegs.size} de ${S.totalSegs} frases`;
  document.getElementById('panelProgress').style.width = pct + '%';
  document.getElementById('topProgress').style.width = pct + '%';
}

let hiSpanAlvo = null;
let menuAberto = false;
let selTimer = null;

function setupSelectionMenu() {
  // Clique em highlight existente → menu de remoção
  document.addEventListener('click', e => {
    const hiSpan = e.target.closest('[data-hi]');
    if (hiSpan && !e.target.closest('#selMenu')) {
      e.stopPropagation();
      hiSpanAlvo = hiSpan;
      const corLabel = { yellow: 'amarelo', green: 'verde', blue: 'azul' };
      const cor = corLabel[hiSpan.dataset.hi] || 'destaque';
      document.getElementById('selMenu').innerHTML = `
        <div class="sel-section-label">Destaque ${cor}</div>
        <button class="sel-btn sel-btn-remove" onclick="removeHighlight()">
          <svg class="sel-icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6">
            <polyline points="3,6 17,6"/><path d="M8,6V4h4v2"/><path d="M5,6l1,11h8l1-11"/>
          </svg>
          Remover destaque
        </button>`;
      posicionarMenu(hiSpan.getBoundingClientRect());
      document.getElementById('selMenu').classList.add('visible');
      menuAberto = true;
      return;
    }
    // Clique fora do menu → fechar
    if (!e.target.closest('#selMenu')) hideMenu();
  });

  // selectionchange — dispara sempre que a seleção muda (mais confiável que mouseup no Safari)
  document.addEventListener('selectionchange', () => {
    clearTimeout(selTimer);
    selTimer = setTimeout(verificarSelecao, 80);
  });
}

function verificarSelecao() {
  const sel = window.getSelection();
  if (!sel || sel.isCollapsed || !sel.toString().trim()) {
    // Não fechar imediatamente — pode ser clique nos botões do menu
    return;
  }
  const texto = sel.toString().trim();
  if (texto.length < 2) return;

  let range;
  try { range = sel.getRangeAt(0); } catch { return; }

  // Verificar se a seleção está dentro de um seg-fr
  const container = range.commonAncestorContainer;
  let frEl = null;
  if (container.nodeType === Node.TEXT_NODE) {
    const pai = container.parentElement;
    frEl = pai?.closest('.seg-fr') || (pai?.classList.contains('seg-fr') ? pai : null);
  } else if (container.classList?.contains('seg-fr')) {
    frEl = container;
  } else {
    frEl = container.closest?.('.seg-fr');
  }
  if (!frEl) return;

  const segEl = frEl.closest('[data-seg]');
  if (!segEl) return;

  currentSel = { segId: segEl.dataset.seg, text: texto, range: range.cloneRange() };
  document.getElementById('selMenu').innerHTML = menuNormalHTML();
  posicionarMenu(range.getBoundingClientRect());
  document.getElementById('selMenu').classList.add('visible');
  menuAberto = true;
}

function posicionarMenu(rect) {
  const menu = document.getElementById('selMenu');
  const menuW = 192;
  // Centralizar horizontalmente próximo ao texto selecionado
  let left = Math.round(rect.left + rect.width / 2 - menuW / 2);
  left = Math.max(12, Math.min(left, window.innerWidth - menuW - 12));
  // Posição vertical: acima da seleção se houver espaço; senão abaixo
  const spaceAbove = rect.top;
  const spaceBelow = window.innerHeight - rect.bottom;
  let top;
  if (spaceAbove >= 180 || spaceAbove >= spaceBelow) {
    // Mostrar acima — âncora no topo da seleção, menu cresce para cima
    top = Math.round(rect.top - 4);
    menu.style.transform = 'translateY(-100%)';
  } else {
    // Mostrar abaixo
    top = Math.round(rect.bottom + 4);
    menu.style.transform = 'none';
  }
  menu.style.left = left + 'px';
  menu.style.top = top + 'px';
}

function removeHighlight() {
  if (!hiSpanAlvo) { hideMenu(); return; }
  const parent = hiSpanAlvo.parentNode;
  if (parent) {
    while (hiSpanAlvo.firstChild) parent.insertBefore(hiSpanAlvo.firstChild, hiSpanAlvo);
    parent.removeChild(hiSpanAlvo);
    parent.normalize();
  }
  hiSpanAlvo = null;
  hideMenu();
}

function hideMenu() {

}

function renderTradView() {
  const tv = document.getElementById('tradView');

      <button class="trad-search-btn" onclick="buscarTraducao()">Buscar</button>
    </div>
    <div class="trad-results" id="tradResults">
      <div class="trad-empty">
        Digite qualquer palavra para ver todas as traduções.<br>
        <em>encore · auteur · œuvre · ancienne · rapport · sens</em>

    </div>`;

function toggleTradDir() {

  const input = document.getElementById('tradInput');

    ? 'Digite qualquer palavra em francês…'
    : 'Digite qualquer palavra em português…';

async function buscarTraducao() {
  const input = document.getElementById('tradInput');
  const termoRaw = input?.value.trim();
  if (!termoRaw) return;
  const results = document.getElementById('tradResults');
  results.innerHTML = '<div class="trad-loading">Buscando…</div>';

  const [srcLang, tgtLang] = tradDir === 'fr-pt' ? ['fr', 'pt'] : ['pt', 'fr'];

  try {
    // ReversoContext API — retorna traduções e exemplos contextuais reais
    const resp = await fetch('https://api.reverso.net/translate/v1/translation', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        format: 'text',
        from: srcLang,
        to: tgtLang,
        input: termoRaw,
        options: {
          sentenceSplitter: false,
          origin: 'translation.web',
          contextResults: true,
          languageDetection: true
        }
      })
    });

    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    const data = await resp.json();

    // Traduções principais
    const traducoes = (data.translation || [])
      .filter(t => t && t.trim())
      .map(t => ({ pt: t.trim(), classe: 'subst' }));

    // Exemplos contextuais com frases FR e PT
    const contextos = (data.contextResults?.results || [])
      .slice(0, 4)
      .map(r => ({
        fr: (r.sourceExamples || [])[0]?.replace(/<[^>]+>/g, '') || '',
        pt: (r.targetExamples || [])[0]?.replace(/<[^>]+>/g, '') || '',
      }))
      .filter(c => c.fr && c.pt);

    if (traducoes.length) {
      renderTradResults(termoRaw, traducoes, contextos);
    } else {
      throw new Error('sem resultados');
    }

  } catch(e) {
    // Fallback: MyMemory
    try {
      const url = `https://api.mymemory.translated.net/get?q=${encodeURIComponent(termoRaw)}&langpair=${srcLang}|${tgtLang}`;
      const resp2 = await fetch(url);
      const data2 = await resp2.json();
      const principal = (data2.responseData?.translatedText || '').trim();
      const invalidos = new Set(['am','is','are','was','were','the','a','an','and','or','but','if','in','on','at','to','of','for','with','that','this','it','he','she','we','they']);
      if (principal && !invalidos.has(principal.toLowerCase())) {
        renderTradResults(termoRaw, [{pt: principal, classe: 'subst'}], []);
        return;
      }
    } catch(e2) {}

    results.innerHTML = `<div class="trad-empty">
      Não foi possível traduzir <strong>"${escH(termoRaw)}"</strong>.<br>
      <small>Verifique sua conexão e tente novamente.</small>
    </div>`;
  }
}

const classeLabel = {subst:'trad.', adj:'adj.', verb:'verb.', adv:'adv.'};

function renderTradResults(termo, traducoes, contextos) {
  const results = document.getElementById('tradResults');
  const tagsHTML = traducoes.map(tr =>
    `<div class="trad-tag subst">
      <span class="trad-tag-label">${classeLabel[tr.classe] || 'trad.'}</span>

// ══════════════════════════════════════════════════════
//  ÁUDIO — pausa real, barra de progresso, voz mais natural
// ══════════════════════════════════════════════════════
let audioAtivo = null;
let audioUtterance = null;
let audioPaused = false;
let audioSpeed = 0.85;
let audioProgressTimer = null;

function playAudio(segId) {
  if (!('speechSynthesis' in window)) { alert('Áudio não suportado. Use Chrome ou Edge.'); return; }
  if (audioAtivo === segId && speechSynthesis.speaking && !audioPaused) { stopAudio(); return; }
  speechSynthesis.cancel();
  audioPaused = false;
  const texto = textosPuros[segId];
  if (!texto) return;
  const utt = new SpeechSynthesisUtterance(texto);
  utt.lang = 'fr-FR';
  utt.rate = audioSpeed;
  utt.pitch = 1.05;  // leve elevação de tom = mais natural
  audioUtterance = utt;

  function speak() {
    const vozes = speechSynthesis.getVoices();
    // Prioridade: vozes Apple (Thomas, Amélie) → vozes Google francês → qualquer fr
    const voz = vozes.find(v => v.lang === 'fr-FR' && /thomas/i.test(v.name))
              || vozes.find(v => v.lang === 'fr-FR' && /amélie|amelie/i.test(v.name))
              || vozes.find(v => v.lang === 'fr-FR' && /google/i.test(v.name))
              || vozes.find(v => v.lang === 'fr-FR')
              || vozes.find(v => v.lang.startsWith('fr'));
    if (voz) utt.voice = voz;

    utt.onstart = () => {
      audioAtivo = segId;
      startAudioUI(segId);
      showAudioControls(segId, texto.length);
      startProgressBar(texto.length, utt);
    };
    utt.onend = utt.onerror = () => {
      // Não esconder o painel — manter visível para o usuário reiniciar
      audioAtivo = null; audioPaused = false; audioUtterance = null;
      clearInterval(audioProgressTimer);
      stopAudioUI();
      // Atualizar botão para play
      const btn = document.getElementById('audioPauseBtn');
      if (btn) {
        btn.classList.remove('paused');
        btn.innerHTML = `<svg viewBox="0 0 20 20" fill="currentColor"><polygon points="4,2 18,10 4,18"/></svg>`;
        btn.title = 'Retomar';
      }
    };
    // Mostrar controles imediatamente
    audioAtivo = segId;
    startAudioUI(segId);
    showAudioControls(segId, texto.length);
    speechSynthesis.speak(utt);
  }

  speechSynthesis.getVoices().length ? speak()
    : (speechSynthesis.onvoiceschanged = () => { speechSynthesis.onvoiceschanged = null; speak(); });
}

function startProgressBar(totalChars, utt) {
  const bar = document.getElementById('audioProgressFill');
  const timeEl = document.getElementById('audioTimeLeft');
  if (!bar) return;
  clearInterval(audioProgressTimer);
  const durEstimada = (totalChars / audioSpeed) * 0.065; // segundos estimados
  const inicio = Date.now();
  audioProgressTimer = setInterval(() => {
    if (!speechSynthesis.speaking || audioPaused) return;
    const elapsed = (Date.now() - inicio) / 1000;
    const pct = Math.min(100, (elapsed / durEstimada) * 100);
    bar.style.width = pct + '%';
    const restante = Math.max(0, Math.round(durEstimada - elapsed));
    if (timeEl) timeEl.textContent = restante > 0 ? restante + 's' : '';
    if (pct >= 100) clearInterval(audioProgressTimer);
  }, 200);
}

function togglePauseAudio() {
  if (!audioAtivo && !audioPaused) return;
  const btn = document.getElementById('audioPauseBtn');
  if (audioPaused) {
    // Retomar
    if (speechSynthesis.paused) {
      speechSynthesis.resume();
    } else {
      // Safari: reiniciar do início
      const segId = audioAtivo || document.getElementById('audioSegLabel').dataset.segId;
      if (segId) { playAudio(segId); return; }
    }
    audioPaused = false;
    btn?.classList.remove('paused');
    btn.innerHTML = `<svg viewBox="0 0 20 20" fill="currentColor">
      <rect x="4" y="3" width="4" height="14" rx="1"/>
      <rect x="12" y="3" width="4" height="14" rx="1"/>
    </svg>`;
    btn.title = 'Pausar';
  } else {
    // Pausar
    speechSynthesis.pause();
    if (!speechSynthesis.paused) speechSynthesis.cancel(); // Safari fallback
    audioPaused = true;
    clearInterval(audioProgressTimer);
    btn?.classList.add('paused');
    btn.innerHTML = `<svg viewBox="0 0 20 20" fill="currentColor"><polygon points="4,2 18,10 4,18"/></svg>`;
    btn.title = 'Retomar';
    stopAudioUI();
    // Manter painel visível
    document.getElementById('audioControls').classList.add('visible');
  }
}

function stopAudio() {
  speechSynthesis.cancel();
  audioAtivo = null; audioPaused = false; audioUtterance = null;
  clearInterval(audioProgressTimer);
  stopAudioUI();
  hideAudioControls();
}

function restartAudio() {
  const label = document.getElementById('audioSegLabel');
  const segId = label?.dataset.segId || audioAtivo;
  if (!segId) return;
  speechSynthesis.cancel();

  clearInterval(audioProgressTimer);

}

// ══════════════════════════════════════════════════════
//  HIGHLIGHT — reescrito com suporte a 3 cores
// ══════════════════════════════════════════════════════
function doHighlight(color) {
  if (!currentSel || !currentSel.range) return;

  const clsMap = { yellow: 'hi-yellow', green: 'hi-green', blue: 'hi-blue' };
  const cls = clsMap[color] || 'hi-yellow';

  // Usar execCommand como fallback robusto que funciona em qualquer seleção
  const range = currentSel.range;
  try {
    // Criar span e envolver a seleção
    const span = document.createElement('span');
    span.className = cls;
    span.dataset.hi = color;

    // Tentar surroundContents primeiro (só funciona se a seleção não cruzar elementos)
    try {
      range.surroundContents(span);
    } catch {
      // Seleção cruza elementos — extrair e envolver o fragmento
      const frag = range.extractContents();
      // Achatar todos os nós do fragmento dentro do span
      const walker = document.createTreeWalker(frag, NodeFilter.SHOW_TEXT);
      const texts = [];
      let node;
      while ((node = walker.nextNode())) texts.push(node);

      if (texts.length > 0) {
        // Re-inserir o fragmento e marcar cada nó de texto
        range.insertNode(frag);
        texts.forEach(textNode => {
          if (textNode.parentNode) {
            const s = document.createElement('span');
            s.className = cls;
            s.dataset.hi = color;
            textNode.parentNode.insertBefore(s, textNode);
            s.appendChild(textNode);
          }
        });
      } else {
        span.appendChild(frag);
        range.insertNode(span);
      }
    }
  } catch (e) {
    console.warn('Highlight error:', e);
  }

  window.getSelection().removeAllRanges();
  currentSel = null;
  hideMenu();
}

// ══════════════════════════════════════════════════════
function loadJSON(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      if (data.licoes) {
        S.seminarios.unshift(data);
        S.semAtual = null;
        renderSidebar();
        loadSeminario(0);
      } else {
        alert('Formato não reconhecido. Use o processador principal.');
      }
    } catch (err) { alert('Erro ao ler JSON: ' + err.message); }
  };
  reader.readAsText(file);
}

function escH(str) {
  return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function formatDate(iso) {
  if (!iso) return '';
  const m = ['jan','fév','mar','avr','mai','juin','juil','août','sep','oct','nov','déc'];
  const [y,mo,d] = iso.split('-');
  return `${parseInt(d)} ${m[parseInt(mo)-1]} ${y}`;
}
